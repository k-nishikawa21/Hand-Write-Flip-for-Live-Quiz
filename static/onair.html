<!doctype html>
<meta charset="utf-8">
<title>On‑Air Tiles</title>
<style>
  /* 余白ゼロ＆背景透明 */
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  #grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    width:100vw;height:100vh;
  }
  #grid .tile{aspect-ratio:16/9;background:#fff;border:2px solid #000;position:relative}
  #grid canvas{position:absolute;inset:0;width:100%;height:100%}
</style>

<div id="grid"></div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
/* --- 設定 --- */
const params=new URLSearchParams(location.search);
const room = params.get("room")||"quiz";
const sock = io();

/* --- 参加者タイルを admin.js と同じ方法で生成 --- */
const tiles=new Map();  // name -> {wrap,cv,ctx}
function makeTile(name){
  const wrap=document.createElement("div");wrap.className="tile";
  wrap.innerHTML=`<canvas></canvas><span style="position:absolute;bottom:2px;left:4px;font-size:14px;background:#fff9">${name}</span>`;
  grid.appendChild(wrap);
  const cv=wrap.querySelector("canvas");cv.width=800;cv.height=450;
  const ctx=cv.getContext("2d");ctx.lineCap="round";ctx.lineJoin="round";
  tiles.set(name,{wrap,cv,ctx,last:null});
}

/* --- 参加者リスト受信 --- */
sock.emit("join",{room,role:"onair"});
sock.on("participants",d=>{
  d.members.forEach(n=>tiles.has(n)||makeTile(n));
});

/* --- 描画イベント --- */
function line(t,x,y,width){
  const {ctx,last}=t;
  ctx.lineWidth=width;
  if(!last){ctx.beginPath();ctx.moveTo(x,y);}
  else{ctx.moveTo(last.x,last.y);}
  ctx.lineTo(x,y);ctx.stroke();
  t.last={x,y};
}
sock.on("stroke_start",d=>{
  const t=tiles.get(d.player); if(t){t.last=null;line(t,d.x,d.y,d.width);}
});
sock.on("stroke_move",d=>{
  const t=tiles.get(d.player); if(t){
    d.xs.forEach((x,i)=>line(t,x,d.ys[i],d.width));
  }
});
sock.on("clear_canvas",d=>{
  const t=tiles.get(d.player); if(t){t.ctx.clearRect(0,0,800,450);}
});
sock.on("reset",()=>tiles.forEach(t=>t.ctx.clearRect(0,0,800,450)));

/* --- 結果表示 --- */
sock.on("result_display",res=>{
  tiles.forEach((t,n)=>{
    const ok=res.correct.includes(n);
    t.wrap.style.background=ok?"#ff3b3b":"#0060ff";
    t.cv.style.filter="invert(100%) grayscale(100%) brightness(220%)";
  });
});
sock.on("result_reset",()=>{
  tiles.forEach(t=>{
    t.wrap.style.background="#fff";
    t.cv.style.filter="none";
  });
});
</script>
